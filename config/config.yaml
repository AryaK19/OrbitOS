# Remote MCP Control System Configuration

# Agent Settings (LangGraph)
agent:
  enabled: true
  timeout: 120  # seconds
  working_dir: "${WORKING_DIR}"  # Set via environment variable
  model: "google/gemini-2.5-flash"
  max_tool_iterations: 25  # Max ReAct tool-calling loops
  temperature: 0.1
  max_context_messages: 20  # Per-user conversation history cap

# Telegram Bot Settings
telegram:
  token: "${TELEGRAM_BOT_TOKEN}"  # Set via environment variable or replace here
  
# Security Settings
security:
  # Whitelist of allowed Telegram user IDs
  whitelist:
    - ${TELEGRAM_USER_ID}  # Set via environment variable
  
  # Default permission level for whitelisted users
  default_permission: "user"
  
  # Password for non-whitelisted users
  password: "${AGENT_PASSWORD}"
  
  # Session expiry time in hours
  session_expiry_hours: 24

# Permission Levels (mapped to user IDs)
permissions:
  admin:
    - ${TELEGRAM_USER_ID}  # Set via environment variable
  user: []
  readonly: []

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/agent.log"
  max_size_mb: 10
  backup_count: 5

# Sandbox Settings
sandbox:
  # Allowed directories for file operations
  allowed_paths:
    - "${SANDBOX_ALLOWED_PATHS}"  # Comma-separated paths, e.g. /Users/me,/tmp
  
  # Blocked commands (regex patterns)
  blocked_commands:
    - "rm -rf /"
    - "format"
    - "del /s /q C:"
    - "shutdown"
    - "restart"
  
  # Python execution settings
  python:
    timeout_seconds: 30
    blocked_imports:
      - "os.system"
      - "subprocess"
      - "shutil.rmtree"

# MCP Server Settings
mcp:
  name: "RemoteAgentMCP"
  version: "1.0.0"
  host: "localhost"
  port: 8765

# Tool Settings
tools:
  shell:
    default_timeout: 60
    max_output_length: 4000
  
  files:
    max_file_size_mb: 100
    list_cache_ttl_seconds: 20
    max_list_limit: 100
    max_search_results: 50
    search_timeout_seconds: 3.0
    allowed_extensions:
      - ".txt"
      - ".py"
      - ".json"
      - ".yaml"
      - ".md"
      - ".log"
      - ".pdf"
      - ".docx"
  
  apps:
    shortcuts:
      # Add custom app shortcuts here (overrides platform defaults)
      # Example: myapp: "/path/to/myapp"
      vscode: "code"
